services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chemischill-backend
    restart: always
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./app-config.yaml:/app/app-config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - chemischill_net

networks:
  chemischill_net:
